server:
  port: 8080

spring:
  application:
    name: scaffold-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/enterprise_scaffold?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

enterprise:
  security:
    jwt:
      issuer: enterprise-scaffold
      secret: ${JWT_SECRET:enterprise-scaffold-local-dev-secret-please-change-32}
      expire-minutes: 120

  file:
    local-upload-path: ${LOCAL_UPLOAD_PATH:D:/Code/enterprise-scaffold/uploads}
    access-prefix: /files
server:
  port: 8080

spring:
  application:
    name: scaffold-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/enterprise_scaffold?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:}
kafka:
  bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${RISK_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}}

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

enterprise:
  security:
    jwt:
      issuer: enterprise-scaffold
      secret: ${JWT_SECRET:enterprise-scaffold-local-dev-secret-please-change-32}
      expire-minutes: 120

  file:
    local-upload-path: ${LOCAL_UPLOAD_PATH:D:/Code/enterprise-scaffold/uploads}
    access-prefix: /files

  mine:
    mqtt:
      enabled: ${MINE_MQTT_ENABLED:true}
      broker-url: ${MINE_MQTT_BROKER_URL:tcp://localhost:1883}
      client-id: ${MINE_MQTT_CLIENT_ID:enterprise-scaffold-mine-subscriber}
      username: ${MINE_MQTT_USERNAME:}
      password: ${MINE_MQTT_PASSWORD:}
      topic: ${MINE_MQTT_TOPIC:mine/sensor/data}
      qos: ${MINE_MQTT_QOS:1}
      completion-timeout: ${MINE_MQTT_COMPLETION_TIMEOUT:5000}

  risk:
    kafka:
      enabled: ${RISK_KAFKA_ENABLED:false}
      bootstrap-servers: ${RISK_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      transaction-topic: ${RISK_KAFKA_TRANSACTION_TOPIC:risk.transaction.events}
      consumer-group-id: ${RISK_KAFKA_CONSUMER_GROUP_ID:enterprise-scaffold-risk-consumer}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: enterprise-scaffold
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "enterprise-scaffold-backend"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "enterprise-scaffold-backend:8080"
        labels:
          application: "enterprise-scaffold"
          module: "backend"
          env: "docker"